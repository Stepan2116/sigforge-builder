<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" font-family="'SF Mono', 'Courier New', monospace">
  <!-- SigForge — Showcase preview animation
       Renders inline in GitHub READMEs. Vector, lightweight, accessible. -->

  <defs>
    <!-- Glow filter for headline elements -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline overlay -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="2" fill="#001a08" opacity="0.3"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a0d"/>
      <stop offset="100%" stop-color="#000900"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,30,10,0.85)"/>
      <stop offset="100%" stop-color="rgba(0,15,5,0.85)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  <rect width="1200" height="700" fill="url(#scanlines)"/>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
    <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="80%" stop-color="rgba(0,0,0,0.5)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.85)"/>
  </radialGradient>
  <rect width="1200" height="700" fill="url(#vignette)" pointer-events="none"/>

  <!-- ═════ HEADER ═════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.6s" fill="freeze"/>

    <!-- pulse dot -->
    <circle cx="60" cy="50" r="6" fill="#00ff88" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <text x="80" y="58" font-size="24" font-weight="700" fill="#00ff88" letter-spacing="6"
          filter="url(#glow)">SIGFORGE</text>

    <text x="240" y="55" font-size="11" fill="#00ffee" letter-spacing="3">
      // MULTI-STRATEGY VALIDATION FRAMEWORK
    </text>

    <!-- right side: live indicator -->
    <rect x="950" y="35" width="100" height="28" fill="none" stroke="#006622" stroke-width="1"/>
    <text x="958" y="54" font-size="11" fill="#00ff88" letter-spacing="2">● LIVE 30s</text>

    <rect x="1060" y="35" width="100" height="28" fill="none" stroke="#006622" stroke-width="1"/>
    <text x="1078" y="54" font-size="11" fill="#00ffee" letter-spacing="2">↗ GITHUB</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#006622" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.6s" fill="freeze"/>
  </line>

  <!-- ═════ HERO ═════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.8s" fill="freeze"/>

    <text x="600" y="135" font-size="22" font-weight="700" fill="#00ff88" text-anchor="middle"
          filter="url(#glow)">
      Polymarket strategies under continuous validation
    </text>
  </g>

  <!-- Hero stats banner -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.8s" fill="freeze"/>

    <rect x="180" y="160" width="840" height="80"
          fill="rgba(0,30,10,0.6)" stroke="#006622" stroke-width="1"/>
    <line x1="180" y1="160" x2="180" y2="240" stroke="#00ff88" stroke-width="3"/>
    <line x1="1020" y1="160" x2="1020" y2="240" stroke="#00ff88" stroke-width="3"/>

    <!-- Stat 1: closed trades — counts up to 32 -->
    <text x="285" y="200" font-size="28" font-weight="700" fill="#00ff88" text-anchor="middle"
          filter="url(#glow)">
      <tspan>0</tspan>
      <animate attributeName="opacity" from="1" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
      <set attributeName="font-size" to="28" begin="0s"/>
    </text>
    <text x="285" y="200" font-size="28" font-weight="700" fill="#00ff88" text-anchor="middle"
          filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
      32
    </text>
    <text x="285" y="225" font-size="10" fill="#b0d0b8" text-anchor="middle" letter-spacing="2">
      CLOSED TRADES
    </text>

    <!-- Stat 2: WR 100% -->
    <text x="495" y="200" font-size="28" font-weight="700" fill="#00ff88" text-anchor="middle"
          filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze"/>
      100%
    </text>
    <text x="495" y="225" font-size="10" fill="#b0d0b8" text-anchor="middle" letter-spacing="2">
      OVERALL WIN RATE
    </text>

    <!-- Stat 3: Sharpe 3.10 — cyan, the hero number -->
    <text x="705" y="200" font-size="28" font-weight="700" fill="#00ffee" text-anchor="middle"
          filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/>
      3.10
    </text>
    <text x="705" y="225" font-size="10" fill="#b0d0b8" text-anchor="middle" letter-spacing="2">
      PEAK SHARPE / TRADE
    </text>

    <!-- Stat 4: 4 strategies live -->
    <text x="915" y="200" font-size="28" font-weight="700" fill="#00ff88" text-anchor="middle"
          filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
      4
    </text>
    <text x="915" y="225" font-size="10" fill="#b0d0b8" text-anchor="middle" letter-spacing="2">
      STRATEGIES LIVE
    </text>
  </g>

  <!-- ═════ STRATEGIES GRID ═════ -->
  <!-- Section header -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="600" y="290" font-size="11" fill="#00ffee" text-anchor="middle" letter-spacing="4">
      ▸ ORIGINAL STRATEGIES — LIVE PAPER VALIDATION
    </text>
  </g>

  <!-- Tile 1: BASKET (spotlight, cyan) -->
  <g transform="translate(80, 320)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.6s" fill="freeze"/>
    <!-- spotlight glow when displayed -->
    <rect width="240" height="220" fill="url(#tileGrad)" stroke="#00ffee" stroke-width="2"
          filter="url(#glow)"/>
    <rect width="3" height="220" fill="#00ffee" filter="url(#glow)"/>

    <text x="20" y="35" font-size="14" font-weight="700" fill="#00ff88" letter-spacing="1.5">
      BASKET
    </text>
    <text x="20" y="55" font-size="9" fill="#b0d0b8">
      Multi-leg arbitrage. Sum&lt;$1.00 → guaranteed
    </text>
    <text x="20" y="68" font-size="9" fill="#b0d0b8">
      payout. Math-backed risk-free.
    </text>

    <!-- metrics -->
    <text x="20" y="105" font-size="9" fill="#006622" letter-spacing="2">PNL</text>
    <text x="20" y="125" font-size="20" font-weight="700" fill="#00ffee" filter="url(#glow)">
      +$5.93
    </text>

    <text x="20" y="150" font-size="9" fill="#006622" letter-spacing="2">WIN RATE</text>
    <text x="20" y="170" font-size="20" font-weight="700" fill="#00ffee" filter="url(#glow)">
      100%
    </text>

    <text x="120" y="105" font-size="9" fill="#006622" letter-spacing="2">SHARPE</text>
    <text x="120" y="125" font-size="20" font-weight="700" fill="#00ffee" filter="url(#glow)">
      3.10
    </text>
    <!-- pulsing star next to Sharpe -->
    <text x="170" y="125" font-size="16" fill="#00ffee">
      ★
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    </text>

    <text x="120" y="150" font-size="9" fill="#006622" letter-spacing="2">CLOSED</text>
    <text x="120" y="170" font-size="20" font-weight="700" fill="#00ff88">
      9
    </text>

    <!-- badge -->
    <rect x="20" y="185" width="120" height="22" fill="rgba(0,255,238,0.15)"
          stroke="#00ffee" stroke-width="1"/>
    <text x="80" y="200" font-size="9" fill="#00ffee" text-anchor="middle" letter-spacing="2">
      ⭐ CENTERPIECE
    </text>
  </g>

  <!-- Tile 2: YIELD-FARM -->
  <g transform="translate(340, 320)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.6s" fill="freeze"/>
    <rect width="240" height="220" fill="url(#tileGrad)" stroke="#006622" stroke-width="1"/>
    <rect width="3" height="220" fill="#00ff88"/>

    <text x="20" y="35" font-size="14" font-weight="700" fill="#00ff88" letter-spacing="1.5">
      YIELD-FARM
    </text>
    <text x="20" y="55" font-size="9" fill="#b0d0b8">
      High-consensus markets at $0.99+ for
    </text>
    <text x="20" y="68" font-size="9" fill="#b0d0b8">
      guaranteed $1.00 resolution.
    </text>

    <text x="20" y="105" font-size="9" fill="#006622" letter-spacing="2">PNL</text>
    <text x="20" y="125" font-size="20" font-weight="700" fill="#00ffee">+$2.26</text>

    <text x="20" y="150" font-size="9" fill="#006622" letter-spacing="2">WIN RATE</text>
    <text x="20" y="170" font-size="20" font-weight="700" fill="#00ffee">100%</text>

    <text x="120" y="105" font-size="9" fill="#006622" letter-spacing="2">SHARPE</text>
    <text x="120" y="125" font-size="20" font-weight="700" fill="#00ffee">1.21</text>

    <text x="120" y="150" font-size="9" fill="#006622" letter-spacing="2">CLOSED</text>
    <text x="120" y="170" font-size="20" font-weight="700" fill="#00ff88">23</text>
  </g>

  <!-- Tile 3: SPORT-SNIPER -->
  <g transform="translate(600, 320)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.6s" fill="freeze"/>
    <rect width="240" height="220" fill="url(#tileGrad)" stroke="#006622" stroke-width="1"/>
    <rect width="3" height="220" fill="#00ff88"/>

    <text x="20" y="35" font-size="14" font-weight="700" fill="#00ff88" letter-spacing="1.5">
      SPORT-SNIPER
    </text>
    <text x="20" y="55" font-size="9" fill="#b0d0b8">
      Live sports markets at $0.92+ during
    </text>
    <text x="20" y="68" font-size="9" fill="#b0d0b8">
      decisive game state. Holds to resolution.
    </text>

    <text x="20" y="105" font-size="9" fill="#006622" letter-spacing="2">PNL</text>
    <text x="20" y="125" font-size="18" font-weight="700" fill="#00ff88">—</text>

    <text x="20" y="150" font-size="9" fill="#006622" letter-spacing="2">OPEN</text>
    <text x="20" y="170" font-size="20" font-weight="700" fill="#00ff88">7</text>

    <text x="120" y="105" font-size="9" fill="#006622" letter-spacing="2">CLOSED</text>
    <text x="120" y="125" font-size="20" font-weight="700" fill="#00ff88">0</text>

    <rect x="20" y="185" width="80" height="22" fill="rgba(0,255,136,0.15)"
          stroke="#00ff88" stroke-width="1"/>
    <text x="60" y="200" font-size="9" fill="#00ff88" text-anchor="middle" letter-spacing="2">
      ⭐ NEW
    </text>
  </g>

  <!-- Tile 4: COPY-TRADER -->
  <g transform="translate(860, 320)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.1s" dur="0.6s" fill="freeze"/>
    <rect width="240" height="220" fill="url(#tileGrad)" stroke="#006622" stroke-width="1"/>
    <rect width="3" height="220" fill="#00ff88"/>

    <text x="20" y="35" font-size="14" font-weight="700" fill="#00ff88" letter-spacing="1.5">
      COPY-TRADER
    </text>
    <text x="20" y="55" font-size="9" fill="#b0d0b8">
      Mirrors verified specialist whales.
    </text>
    <text x="20" y="68" font-size="9" fill="#b0d0b8">
      Risk-gated copy with filter discipline.
    </text>

    <text x="20" y="105" font-size="9" fill="#006622" letter-spacing="2">PNL</text>
    <text x="20" y="125" font-size="18" font-weight="700" fill="#00ff88">—</text>

    <text x="20" y="150" font-size="9" fill="#006622" letter-spacing="2">SAMPLE</text>
    <text x="20" y="170" font-size="20" font-weight="700" fill="#00ff88">1804 sigs</text>

    <text x="120" y="105" font-size="9" fill="#006622" letter-spacing="2">STATUS</text>
    <text x="120" y="125" font-size="14" font-weight="700" fill="#ffb000">debug</text>
  </g>

  <!-- ═════ FOOTER ═════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.6s" fill="freeze"/>
    <line x1="40" y1="600" x2="1160" y2="600" stroke="#006622" stroke-width="1"
          stroke-dasharray="4 4"/>

    <text x="600" y="630" font-size="11" fill="#00ffee" text-anchor="middle" letter-spacing="2">
      Builder Code: 0x6a386ecc...8ba1 · API key on file · EU-based
    </text>
    <text x="600" y="655" font-size="10" fill="#006622" text-anchor="middle" letter-spacing="2">
      http://18.178.69.19/showcase.html?tour=1 · github.com/Stepan2116/sigforge-builder
    </text>
    <text x="600" y="680" font-size="9" fill="#006622" text-anchor="middle" letter-spacing="3">
      backend: AWS Lightsail Tokyo · infrastructure live since April 2026
    </text>
  </g>
</svg>
